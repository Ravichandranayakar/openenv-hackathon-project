name: customer-support-env
version: 1.0.0
description: Customer Support Environment - An AI training environment for handling support tickets

environment:
  class: my_env.server.customer_support_environment:CustomerSupportEnvironment
  action_type: models:SupportAction
  observation_type: models:SupportObservation

server:
  host: 0.0.0.0
  port: 8000
  module: my_env.server.app
  app: app
  main: main

tasks:
  - id: easy_task
    name: "Easy Support Task"
    description: "Handle a simple customer support ticket"
    grader: my_env.graders:EasyTaskGrader
  
  - id: medium_task
    name: "Medium Support Task"
    description: "Handle a moderately complex customer support ticket"
    grader: my_env.graders:MediumTaskGrader
  
  - id: hard_task
    name: "Hard Support Task"
    description: "Handle a complex customer support ticket"
    grader: my_env.graders:HardTaskGrader

metadata:
  author: Hackathon Team
  website: https://huggingface.co/spaces
  license: BSD-3-Clause
