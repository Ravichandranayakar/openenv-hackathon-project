# Multi-Agent Training Configuration - PPO (Single consolidated file)

training:
  algorithm: "ppo"
  num_episodes: 500
  max_steps_per_episode: 10
  learning_rate: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  entropy_coef: 0.01
  ppo_epochs: 4
  batch_size: 32
  checkpoint_freq: 50
  device: "cuda"

model:
  responder:
    encoder_model: "distilbert-base-uncased"
    encoder_dim: 768
    encoder_frozen: true
    
  coordinator:
    algorithm: "ppo"
    ppo_input_dim: 773
    ppo_output_dim: 5
    ppo_hidden_dims: [256, 128, 64]
    actor_critic: true
    
  specialist:
    num_specialists: 3
    types: ["billing", "account", "technical"]

curriculum:
  enabled: true
  stages: ["easy", "medium", "hard"]
  episodes_per_stage: 100

logging:
  level: "INFO"
  log_file: "training.log"
