# Multi-Agent Training Configuration (Single consolidated file)

training:
  num_episodes: 500
  max_steps_per_episode: 10
  learning_rate: 1.0e-4
  gamma: 0.99
  replay_buffer_size: 10000
  batch_size: 32
  checkpoint_freq: 50
  device: "cuda"

model:
  responder:
    encoder_model: "distilbert-base-uncased"
    encoder_dim: 768
    encoder_frozen: true
    
  coordinator:
    dqn_input_dim: 773
    dqn_output_dim: 5
    dqn_hidden_dims: [256, 128, 64]
    dueling: true
    
  specialist:
    num_specialists: 3
    types: ["billing", "account", "technical"]

curriculum:
  enabled: true
  stages: ["easy", "medium", "hard"]
  episodes_per_stage: 100

logging:
  level: "INFO"
  log_file: "training.log"
